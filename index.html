<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether AI | Neural Intelligence Directory</title>
    <!-- React & Babel for Standalone Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Sophisticated Dark Theme Styles */
      body {
        background-color: #080808;
        background: radial-gradient(
          circle at 50% -20%,
          #1a1a2e 0%,
          #080808 70%
        );
        color: #ffffff;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif {
        font-family: "Georgia", serif;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #080808;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #818cf8;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .accent-glow {
        box-shadow: 0 0 40px rgba(129, 140, 248, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useEffect } = React;

      // --- Data ---
      const AI_TOOLS = [
        {
          id: "chatgpt",
          name: "ChatGPT",
          description:
            "The industry-leading conversational AI by OpenAI. Versatile for writing and coding.",
          category: "Text",
          link: "https://chat.openai.com",
          pricing: "Freemium",
        },
        {
          id: "claude",
          name: "Claude",
          description:
            "Anthropic's high-performance LLM known for nuanced writing and safety.",
          category: "Text",
          link: "https://claude.ai",
          pricing: "Freemium",
        },
        {
          id: "midjourney",
          name: "Midjourney",
          description:
            "Top-tier art generation renowned for photographic realism.",
          category: "Image",
          link: "https://www.midjourney.com",
          pricing: "Paid",
        },
        {
          id: "v0",
          name: "v0.dev",
          description:
            "AI-powered component generator. Builds React components from natural language.",
          category: "Code",
          link: "https://v0.dev",
          pricing: "Freemium",
        },
        {
          id: "cursor",
          name: "Cursor",
          description:
            "An AI-first code editor for deep codebase understanding.",
          category: "Code",
          link: "https://www.cursor.com",
          pricing: "Freemium",
        },
        {
          id: "runway",
          name: "Runway Gen-3",
          description: "Powerful AI video generation for cinematic visuals.",
          category: "Video",
          link: "https://runwayml.com",
          pricing: "Freemium",
        },
        {
          id: "elevenlabs",
          name: "ElevenLabs",
          description:
            "Realistic AI voice generator and text-to-speech engine.",
          category: "Audio",
          link: "https://elevenlabs.io",
          pricing: "Freemium",
        },
        {
          id: "suno",
          name: "Suno",
          description:
            "Create full-length songs with lyrics and melody from a simple prompt.",
          category: "Audio",
          link: "https://suno.com",
          pricing: "Freemium",
        },
        {
          id: "perplexity",
          name: "Perplexity AI",
          description: "AI-powered search engine with real-time citations.",
          category: "Text",
          link: "https://www.perplexity.ai",
          pricing: "Freemium",
        },
      ];

      const CATEGORIES = ["All", "Text", "Image", "Video", "Code", "Audio"];

      // --- Components ---
      function Icon({ name, size = 16, className = "" }) {
        return (
          <i
            data-lucide={name}
            style={{ width: size, height: size }}
            className={className}
          ></i>
        );
      }

      function App() {
        const [activeCategory, setActiveCategory] = useState("All");
        const [searchQuery, setSearchQuery] = useState("");
        const [apiKey, setApiKey] = useState(
          localStorage.getItem("GOOGLE_GEMINI_API_KEY") || "",
        );
        const [showApiKeyModal, setShowApiKeyModal] = useState(false);
        const [isChatOpen, setIsChatOpen] = useState(false);
        const [chatMessages, setChatMessages] = useState([
          {
            role: "model",
            parts: [
              {
                text: "Neural Interface Active. How can I assist with your workflow today?",
              },
            ],
          },
        ]);
        const [chatInput, setChatInput] = useState("");
        const [isAiLoading, setIsAiLoading] = useState(false);
        const [isSearching, setIsSearching] = useState(false);

        useEffect(() => {
          // Initialize Lucide icons
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, [activeCategory, searchQuery, isChatOpen, showApiKeyModal]);

        const saveApiKey = (key) => {
          const trimmedKey = key.trim();
          localStorage.setItem("GOOGLE_GEMINI_API_KEY", trimmedKey);
          setApiKey(trimmedKey);
          setShowApiKeyModal(false);
        };

        const callGemini = async (contents) => {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error?.message || "API Request Failed");
          }
          return data.candidates[0].content.parts[0].text;
        };

        const handleChatSubmit = async (e) => {
          e.preventDefault();
          if (!apiKey) return setShowApiKeyModal(true);
          if (!chatInput.trim() || isAiLoading) return;

          const newMessages = [
            ...chatMessages,
            { role: "user", parts: [{ text: chatInput }] },
          ];
          setChatMessages(newMessages);
          setChatInput("");
          setIsAiLoading(true);

          try {
            const ctx = `System context: You are Aether AI assistant. Guide the user on AI tools. Our tools: ${AI_TOOLS.map((t) => t.name).join(", ")}. Keep replies brief and professional.`;

            const apiMessages = newMessages.filter(
              (msg) =>
                !msg.parts[0].text.includes("Neural Interface Active") &&
                !msg.parts[0].text.includes("Error connecting") &&
                !msg.parts[0].text.includes("Please check your API key"),
            );

            const contents = [
              { role: "user", parts: [{ text: ctx }] },
              { role: "model", parts: [{ text: "Understood." }] },
              ...apiMessages,
            ];

            const reply = await callGemini(contents);
            setChatMessages((prev) => [
              ...prev,
              { role: "model", parts: [{ text: reply }] },
            ]);
          } catch (err) {
            setChatMessages((prev) => [
              ...prev,
              {
                role: "model",
                parts: [
                  {
                    text:
                      err.message ||
                      "Error connecting to neural node. Check API key.",
                  },
                ],
              },
            ]);
          } finally {
            setIsAiLoading(false);
          }
        };

        const handleSmartSearch = async () => {
          if (!apiKey) return setShowApiKeyModal(true);
          if (!searchQuery.trim() || isSearching) return;

          setIsSearching(true);
          try {
            const prompt = `User query: "${searchQuery}". Our tools: ${AI_TOOLS.map((t) => t.name).join(", ")}. Return just the name of the single most relevant tool. No extra text or punctuation.`;
            const reply = await callGemini([
              { role: "user", parts: [{ text: prompt }] },
            ]);
            const matchName = reply.trim();
            if (matchName) {
              setSearchQuery(matchName);
              setActiveCategory("All");
            }
          } catch (err) {
            console.error(err);
          } finally {
            setIsSearching(false);
          }
        };

        const filteredTools = useMemo(() => {
          return AI_TOOLS.filter((tool) => {
            const matchesCat =
              activeCategory === "All" || tool.category === activeCategory;
            const matchesSearch =
              tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
              tool.description
                .toLowerCase()
                .includes(searchQuery.toLowerCase());
            return matchesCat && matchesSearch;
          });
        }, [activeCategory, searchQuery]);

        return (
          <div className="flex flex-col min-h-screen">
            {/* Navigation */}
            <nav className="sticky top-0 z-50 bg-[#080808]/60 backdrop-blur-xl border-b border-white/5 px-8 py-6">
              <div className="max-w-7xl mx-auto flex justify-between items-center">
                <div className="flex items-center gap-2 font-serif font-bold italic text-2xl tracking-tight">
                  <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8]" />
                  <span className="text-white">Aether.ai</span>
                </div>
                <div className="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[2px] font-medium text-white/40">
                  <a
                    href="#directory"
                    className="hover:text-white transition-colors"
                  >
                    Directory
                  </a>
                  <button
                    onClick={() => setShowApiKeyModal(true)}
                    className="hover:text-white transition-colors flex items-center gap-2"
                  >
                    <Icon name="key" size={14} /> API Key
                  </button>
                  <button className="border border-white/20 text-white px-8 py-2 rounded-full text-[10px] font-bold hover:bg-white/5 transition-all">
                    LOGIN
                  </button>
                </div>
              </div>
            </nav>

            {/* Hero */}
            <header className="pt-32 pb-24 px-8 text-left max-w-7xl mx-auto w-full">
              <span className="text-[11px] uppercase tracking-[4px] text-[#818CF8] mb-8 block font-medium">
                Enterprise Intelligence Node
              </span>
              <h1 className="font-serif text-6xl md:text-8xl font-normal leading-[0.95] tracking-[-3px] mb-8 max-w-4xl">
                Forge the Future of <br /> Digital Cognition.
              </h1>
              <p className="text-white/50 text-lg md:text-xl max-w-lg mb-12">
                A curated ecosystem of autonomous tools designed for
                high-performance creative synthesis.
              </p>
              <div className="flex gap-6">
                <a
                  href="#directory"
                  className="bg-white text-black font-bold py-4 px-12 rounded-full text-[10px] uppercase tracking-widest hover:scale-105 transition-all"
                >
                  Start Exploring
                </a>
                <button
                  onClick={() => setIsChatOpen(true)}
                  className="border border-white/20 py-4 px-12 rounded-full text-[10px] text-white uppercase tracking-widest hover:bg-white/5 transition-all flex items-center gap-2"
                >
                  <Icon name="message-square" size={14} /> AI Assistant
                </button>
              </div>
              <div className="h-[1px] bg-gradient-to-r from-[#818CF8]/30 to-transparent mt-24 opacity-40 w-full" />
            </header>

            {/* Main Content */}
            <main
              className="max-w-7xl mx-auto px-8 w-full py-16"
              id="directory"
            >
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-12 mb-16">
                <div>
                  <span className="text-[10px] uppercase tracking-[3px] text-[#818CF8] mb-2 block">
                    Repository
                  </span>
                  <h2 className="font-serif text-5xl">Intelligence Nodes</h2>
                </div>
                <div className="relative group w-full md:w-[450px] flex gap-2">
                  <input
                    type="text"
                    placeholder="Semantic query..."
                    className="w-full bg-black/20 border border-white/10 rounded-full px-8 py-3 focus:outline-none focus:border-[#818CF8]/40 transition-all text-xs tracking-widest lowercase"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && handleSmartSearch()}
                  />
                  <button
                    onClick={handleSmartSearch}
                    disabled={isSearching}
                    className="bg-[#818CF8]/10 text-[#818CF8] border border-[#818CF8]/30 px-6 rounded-full hover:bg-[#818CF8]/20 transition-colors text-[10px] uppercase tracking-widest whitespace-nowrap"
                  >
                    {isSearching ? (
                      <Icon
                        name="loader-2"
                        size={14}
                        className="animate-spin"
                      />
                    ) : (
                      "Smart Search"
                    )}
                  </button>
                </div>
              </div>

              {/* Filters */}
              <div className="flex gap-10 mb-16 overflow-x-auto pb-4 no-scrollbar border-b border-white/5 uppercase tracking-[2px] text-[10px] font-bold">
                {CATEGORIES.map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`whitespace-nowrap relative py-2 transition-colors ${activeCategory === cat ? "text-white" : "text-white/30 hover:text-white"}`}
                  >
                    {cat}
                    {activeCategory === cat && (
                      <div className="absolute -bottom-[5px] left-0 right-0 h-[2px] bg-[#818CF8]" />
                    )}
                  </button>
                ))}
              </div>

              {/* Grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {filteredTools.map((tool) => (
                  <a
                    href={tool.link}
                    target="_blank"
                    key={tool.id}
                    className="block bg-white/5 border border-white/10 p-8 rounded-2xl flex flex-col min-h-[300px] hover:border-[#818CF8]/40 transition-all group"
                  >
                    <div className="flex justify-between items-start mb-6">
                      <span className="text-[10px] uppercase tracking-[2px] text-white/40">
                        {tool.category}
                      </span>
                      <span className="text-[10px] font-bold text-[#818CF8] tracking-widest">
                        {tool.pricing}
                      </span>
                    </div>
                    <h3 className="font-serif text-3xl mb-4 group-hover:translate-x-1 transition-transform duration-500">
                      {tool.name}
                    </h3>
                    <p className="text-white/50 text-sm leading-relaxed mb-8 flex-grow">
                      {tool.description}
                    </p>
                    <div className="flex justify-between items-center pt-6 border-t border-white/5">
                      <span className="flex items-center gap-2 text-[10px] uppercase tracking-widest text-white/40">
                        <span className="w-1 h-1 rounded-full bg-[#818CF8]" />
                        Active System
                      </span>
                      <div className="text-white/40 group-hover:text-white transition-colors">
                        Visit Node →
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </main>

            {/* Footer */}
            <footer className="border-t border-white/5 bg-[#080808] py-24 px-8 mt-auto">
              <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16">
                <div className="max-w-md">
                  <div className="font-serif italic font-bold text-2xl flex items-center gap-2 mb-8">
                    <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8]" />
                    Aether.ai
                  </div>
                  <p className="text-white/40 text-sm leading-relaxed">
                    The premier ecosystem of autonomous generative tools
                    designed for high-performance engineering and creative
                    synthesis.
                  </p>
                </div>
                <div className="grid grid-cols-2 gap-24">
                  <div>
                    <h4 className="text-[10px] uppercase tracking-[3px] font-bold mb-8">
                      Navigation
                    </h4>
                    <div className="flex flex-col gap-4 text-[11px] uppercase tracking-widest text-white/40">
                      <a href="#" className="hover:text-white">
                        Compute
                      </a>
                      <a href="#" className="hover:text-white">
                        Models
                      </a>
                      <a href="#" className="hover:text-white">
                        Security
                      </a>
                    </div>
                  </div>
                  <div>
                    <h4 className="text-[10px] uppercase tracking-[3px] font-bold mb-8">
                      Status
                    </h4>
                    <div className="flex gap-4 text-white/40">
                      <span>Terminal v4.2</span>
                    </div>
                  </div>
                </div>
              </div>
              <div className="max-w-7xl mx-auto mt-24 pt-12 border-t border-white/5 flex justify-between items-center text-[9px] uppercase tracking-[3px] text-white/30">
                <p>© 2026 Aether Neural Infrastructure</p>
                <div className="flex gap-12">
                  <a href="#" className="hover:text-white">
                    Privacy
                  </a>
                  <a href="#" className="hover:text-white">
                    Terms
                  </a>
                </div>
              </div>
            </footer>

            {/* AI Chat Assistant */}
            {isChatOpen && (
              <div className="fixed bottom-6 right-6 w-80 sm:w-96 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50">
                <div className="bg-black/50 p-4 border-b border-white/10 flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-[#818CF8] animate-pulse" />
                    <span className="text-xs uppercase tracking-[2px] font-bold">
                      Neural Assistant
                    </span>
                  </div>
                  <button
                    onClick={() => setIsChatOpen(false)}
                    className="text-white/40 hover:text-white"
                  >
                    <Icon name="x" size={16} />
                  </button>
                </div>

                <div className="flex-grow p-4 h-80 overflow-y-auto flex flex-col gap-4 no-scrollbar">
                  {chatMessages.map((msg, i) => (
                    <div
                      key={i}
                      className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}
                    >
                      <div
                        className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                          msg.role === "user"
                            ? "bg-[#818CF8]/20 text-[#e0e7ff] rounded-br-sm"
                            : "bg-white/5 text-white/80 rounded-bl-sm border border-white/5"
                        }`}
                      >
                        {msg.parts[0].text}
                      </div>
                    </div>
                  ))}
                  {isAiLoading && (
                    <div className="flex justify-start">
                      <div className="bg-white/5 border border-white/5 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-2">
                        <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" />
                        <div
                          className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce"
                          style={{ animationDelay: "0.1s" }}
                        />
                        <div
                          className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce"
                          style={{ animationDelay: "0.2s" }}
                        />
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-4 bg-black/50 border-t border-white/10">
                  <form
                    onSubmit={handleChatSubmit}
                    className="relative flex items-center"
                  >
                    <input
                      type="text"
                      placeholder="Commence query..."
                      className="w-full bg-white/5 border border-white/10 rounded-full pl-4 pr-12 py-3 text-xs focus:outline-none focus:border-[#818CF8]/40"
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                    />
                    <button
                      type="submit"
                      disabled={isAiLoading || !chatInput.trim()}
                      className="absolute right-2 p-2 bg-[#818CF8]/20 text-[#818CF8] rounded-full hover:bg-[#818CF8]/40 transition-colors disabled:opacity-50"
                    >
                      <Icon name="arrow-up" size={14} />
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* API Key Modal */}
            {showApiKeyModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100] px-4">
                <div className="bg-[#080808] border border-white/10 p-8 rounded-2xl max-w-md w-full relative accent-glow">
                  <button
                    onClick={() => setShowApiKeyModal(false)}
                    className="absolute top-4 right-4 text-white/40 hover:text-white"
                  >
                    <Icon name="x" size={20} />
                  </button>
                  <h3 className="font-serif text-2xl mb-4">
                    Neural Access Node
                  </h3>
                  <p className="text-white/50 text-sm mb-6 leading-relaxed">
                    Please provide a Google Gemini API key to activate the Smart
                    Search and Chat Assistant features. The key is securely
                    stored in your browser's local cache.
                  </p>
                  <input
                    type="password"
                    defaultValue={apiKey}
                    id="api-key-input"
                    placeholder="AIzaSy..."
                    className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#818CF8]/40 tracking-widest text-sm"
                  />
                  <button
                    onClick={() =>
                      saveApiKey(document.getElementById("api-key-input").value)
                    }
                    className="w-full bg-[#818CF8]/10 border border-[#818CF8]/30 text-[#818CF8] font-bold uppercase tracking-widest text-[10px] py-4 rounded-lg hover:bg-[#818CF8]/20 transition-all"
                  >
                    Activate Interface
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html><!doctype html>

          id: "midjourney",
          name: "Midjourney",
          description:
            "Top-tier art generation renowned for photographic realism.",
          category: "Image",
          link: "https://www.midjourney.com",
          pricing: "Paid",
        },
        {
          id: "v0",
          name: "v0.dev",
          description:
            "AI-powered component generator. Builds React components from natural language.",
          category: "Code",
          link: "https://v0.dev",
          pricing: "Freemium",
        },
        {
          id: "cursor",
          name: "Cursor",
          description:
            "An AI-first code editor for deep codebase understanding.",
          category: "Code",
          link: "https://www.cursor.com",
          pricing: "Freemium",
        },
        {
          id: "runway",
          name: "Runway Gen-3",
          description: "Powerful AI video generation for cinematic visuals.",
          category: "Video",
          link: "https://runwayml.com",
          pricing: "Freemium",
        },
        {
          id: "elevenlabs",
          name: "ElevenLabs",
          description:
            "Realistic AI voice generator and text-to-speech engine.",
          category: "Audio",
          link: "https://elevenlabs.io",
          pricing: "Freemium",
        },
        {
          id: "suno",
          name: "Suno",
          description:
            "Create full-length songs with lyrics and melody from a simple prompt.",
          category: "Audio",
          link: "https://suno.com",
          pricing: "Freemium",
        },
        {
          id: "perplexity",
          name: "Perplexity AI",
          description: "AI-powered search engine with real-time citations.",
          category: "Text",
          link: "https://www.perplexity.ai",
          pricing: "Freemium",
        },
      ];

      const CATEGORIES = ["All", "Text", "Image", "Video", "Code", "Audio"];

      // --- Components ---
      function Icon({ name, size = 16, className = "" }) {
        return (
          <i
            data-lucide={name}
            style={{ width: size, height: size }}
            className={className}
          ></i>
        );
      }

      function App() {
        const [activeCategory, setActiveCategory] = useState("All");
        const [searchQuery, setSearchQuery] = useState("");
        const [apiKey, setApiKey] = useState(
          localStorage.getItem("GOOGLE_GEMINI_API_KEY") || "",
        );
        const [showApiKeyModal, setShowApiKeyModal] = useState(false);
        const [isChatOpen, setIsChatOpen] = useState(false);
        const [chatMessages, setChatMessages] = useState([
          {
            role: "model",
            parts: [
              {
                text: "Neural Interface Active. How can I assist with your workflow today?",
              },
            ],
          },
        ]);
        const [chatInput, setChatInput] = useState("");
        const [isAiLoading, setIsAiLoading] = useState(false);
        const [isSearching, setIsSearching] = useState(false);

        useEffect(() => {
          // Initialize Lucide icons
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, [activeCategory, searchQuery, isChatOpen, showApiKeyModal]);

        const saveApiKey = (key) => {
          const trimmedKey = key.trim();
          localStorage.setItem("GOOGLE_GEMINI_API_KEY", trimmedKey);
          setApiKey(trimmedKey);
          setShowApiKeyModal(false);
        };

        const callGemini = async (contents) => {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error?.message || "API Request Failed");
          }
          return data.candidates[0].content.parts[0].text;
        };

        const handleChatSubmit = async (e) => {
          e.preventDefault();
          if (!apiKey) return setShowApiKeyModal(true);
          if (!chatInput.trim() || isAiLoading) return;

          const newMessages = [
            ...chatMessages,
            { role: "user", parts: [{ text: chatInput }] },
          ];
          setChatMessages(newMessages);
          setChatInput("");
          setIsAiLoading(true);

          try {
            const ctx = `System context: You are Aether AI assistant. Guide the user on AI tools. Our tools: ${AI_TOOLS.map((t) => t.name).join(", ")}. Keep replies brief and professional.`;

            const apiMessages = newMessages.filter(
              (msg) =>
                !msg.parts[0].text.includes("Neural Interface Active") &&
                !msg.parts[0].text.includes("Error connecting") &&
                !msg.parts[0].text.includes("Please check your API key"),
            );

            const contents = [
              { role: "user", parts: [{ text: ctx }] },
              { role: "model", parts: [{ text: "Understood." }] },
              ...apiMessages,
            ];

            const reply = await callGemini(contents);
            setChatMessages((prev) => [
              ...prev,
              { role: "model", parts: [{ text: reply }] },
            ]);
          } catch (err) {
            setChatMessages((prev) => [
              ...prev,
              {
                role: "model",
                parts: [
                  {
                    text:
                      err.message ||
                      "Error connecting to neural node. Check API key.",
                  },
                ],
              },
            ]);
          } finally {
            setIsAiLoading(false);
          }
        };

        const handleSmartSearch = async () => {
          if (!apiKey) return setShowApiKeyModal(true);
          if (!searchQuery.trim() || isSearching) return;

          setIsSearching(true);
          try {
            const prompt = `User query: "${searchQuery}". Our tools: ${AI_TOOLS.map((t) => t.name).join(", ")}. Return just the name of the single most relevant tool. No extra text or punctuation.`;
            const reply = await callGemini([
              { role: "user", parts: [{ text: prompt }] },
            ]);
            const matchName = reply.trim();
            if (matchName) {
              setSearchQuery(matchName);
              setActiveCategory("All");
            }
          } catch (err) {
            console.error(err);
          } finally {
            setIsSearching(false);
          }
        };

        const filteredTools = useMemo(() => {
          return AI_TOOLS.filter((tool) => {
            const matchesCat =
              activeCategory === "All" || tool.category === activeCategory;
            const matchesSearch =
              tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
              tool.description
                .toLowerCase()
                .includes(searchQuery.toLowerCase());
            return matchesCat && matchesSearch;
          });
        }, [activeCategory, searchQuery]);

        return (
          <div className="flex flex-col min-h-screen">
            {/* Navigation */}
            <nav className="sticky top-0 z-50 bg-[#080808]/60 backdrop-blur-xl border-b border-white/5 px-8 py-6">
              <div className="max-w-7xl mx-auto flex justify-between items-center">
                <div className="flex items-center gap-2 font-serif font-bold italic text-2xl tracking-tight">
                  <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8]" />
                  <span className="text-white">Aether.ai</span>
                </div>
                <div className="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[2px] font-medium text-white/40">
                  <a
                    href="#directory"
                    className="hover:text-white transition-colors"
                  >
                    Directory
                  </a>
                  <button
                    onClick={() => setShowApiKeyModal(true)}
                    className="hover:text-white transition-colors flex items-center gap-2"
                  >
                    <Icon name="key" size={14} /> API Key
                  </button>
                  <button className="border border-white/20 text-white px-8 py-2 rounded-full text-[10px] font-bold hover:bg-white/5 transition-all">
                    LOGIN
                  </button>
                </div>
              </div>
            </nav>

            {/* Hero */}
            <header className="pt-32 pb-24 px-8 text-left max-w-7xl mx-auto w-full">
              <span className="text-[11px] uppercase tracking-[4px] text-[#818CF8] mb-8 block font-medium">
                Enterprise Intelligence Node
              </span>
              <h1 className="font-serif text-6xl md:text-8xl font-normal leading-[0.95] tracking-[-3px] mb-8 max-w-4xl">
                Forge the Future of <br /> Digital Cognition.
              </h1>
              <p className="text-white/50 text-lg md:text-xl max-w-lg mb-12">
                A curated ecosystem of autonomous tools designed for
                high-performance creative synthesis.
              </p>
              <div className="flex gap-6">
                <a
                  href="#directory"
                  className="bg-white text-black font-bold py-4 px-12 rounded-full text-[10px] uppercase tracking-widest hover:scale-105 transition-all"
                >
                  Start Exploring
                </a>
                <button
                  onClick={() => setIsChatOpen(true)}
                  className="border border-white/20 py-4 px-12 rounded-full text-[10px] text-white uppercase tracking-widest hover:bg-white/5 transition-all flex items-center gap-2"
                >
                  <Icon name="message-square" size={14} /> AI Assistant
                </button>
              </div>
              <div className="h-[1px] bg-gradient-to-r from-[#818CF8]/30 to-transparent mt-24 opacity-40 w-full" />
            </header>

            {/* Main Content */}
            <main
              className="max-w-7xl mx-auto px-8 w-full py-16"
              id="directory"
            >
              <div className="flex flex-col md:flex-row md:items-end justify-between gap-12 mb-16">
                <div>
                  <span className="text-[10px] uppercase tracking-[3px] text-[#818CF8] mb-2 block">
                    Repository
                  </span>
                  <h2 className="font-serif text-5xl">Intelligence Nodes</h2>
                </div>
                <div className="relative group w-full md:w-[450px] flex gap-2">
                  <input
                    type="text"
                    placeholder="Semantic query..."
                    className="w-full bg-black/20 border border-white/10 rounded-full px-8 py-3 focus:outline-none focus:border-[#818CF8]/40 transition-all text-xs tracking-widest lowercase"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && handleSmartSearch()}
                  />
                  <button
                    onClick={handleSmartSearch}
                    disabled={isSearching}
                    className="bg-[#818CF8]/10 text-[#818CF8] border border-[#818CF8]/30 px-6 rounded-full hover:bg-[#818CF8]/20 transition-colors text-[10px] uppercase tracking-widest whitespace-nowrap"
                  >
                    {isSearching ? (
                      <Icon
                        name="loader-2"
                        size={14}
                        className="animate-spin"
                      />
                    ) : (
                      "Smart Search"
                    )}
                  </button>
                </div>
              </div>

              {/* Filters */}
              <div className="flex gap-10 mb-16 overflow-x-auto pb-4 no-scrollbar border-b border-white/5 uppercase tracking-[2px] text-[10px] font-bold">
                {CATEGORIES.map((cat) => (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`whitespace-nowrap relative py-2 transition-colors ${activeCategory === cat ? "text-white" : "text-white/30 hover:text-white"}`}
                  >
                    {cat}
                    {activeCategory === cat && (
                      <div className="absolute -bottom-[5px] left-0 right-0 h-[2px] bg-[#818CF8]" />
                    )}
                  </button>
                ))}
              </div>

              {/* Grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {filteredTools.map((tool) => (
                  <a
                    href={tool.link}
                    target="_blank"
                    key={tool.id}
                    className="block bg-white/5 border border-white/10 p-8 rounded-2xl flex flex-col min-h-[300px] hover:border-[#818CF8]/40 transition-all group"
                  >
                    <div className="flex justify-between items-start mb-6">
                      <span className="text-[10px] uppercase tracking-[2px] text-white/40">
                        {tool.category}
                      </span>
                      <span className="text-[10px] font-bold text-[#818CF8] tracking-widest">
                        {tool.pricing}
                      </span>
                    </div>
                    <h3 className="font-serif text-3xl mb-4 group-hover:translate-x-1 transition-transform duration-500">
                      {tool.name}
                    </h3>
                    <p className="text-white/50 text-sm leading-relaxed mb-8 flex-grow">
                      {tool.description}
                    </p>
                    <div className="flex justify-between items-center pt-6 border-t border-white/5">
                      <span className="flex items-center gap-2 text-[10px] uppercase tracking-widest text-white/40">
                        <span className="w-1 h-1 rounded-full bg-[#818CF8]" />
                        Active System
                      </span>
                      <div className="text-white/40 group-hover:text-white transition-colors">
                        Visit Node →
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </main>

            {/* Footer */}
            <footer className="border-t border-white/5 bg-[#080808] py-24 px-8 mt-auto">
              <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16">
                <div className="max-w-md">
                  <div className="font-serif italic font-bold text-2xl flex items-center gap-2 mb-8">
                    <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8]" />
                    Aether.ai
                  </div>
                  <p className="text-white/40 text-sm leading-relaxed">
                    The premier ecosystem of autonomous generative tools
                    designed for high-performance engineering and creative
                    synthesis.
                  </p>
                </div>
                <div className="grid grid-cols-2 gap-24">
                  <div>
                    <h4 className="text-[10px] uppercase tracking-[3px] font-bold mb-8">
                      Navigation
                    </h4>
                    <div className="flex flex-col gap-4 text-[11px] uppercase tracking-widest text-white/40">
                      <a href="#" className="hover:text-white">
                        Compute
                      </a>
                      <a href="#" className="hover:text-white">
                        Models
                      </a>
                      <a href="#" className="hover:text-white">
                        Security
                      </a>
                    </div>
                  </div>
                  <div>
                    <h4 className="text-[10px] uppercase tracking-[3px] font-bold mb-8">
                      Status
                    </h4>
                    <div className="flex gap-4 text-white/40">
                      <span>Terminal v4.2</span>
                    </div>
                  </div>
                </div>
              </div>
              <div className="max-w-7xl mx-auto mt-24 pt-12 border-t border-white/5 flex justify-between items-center text-[9px] uppercase tracking-[3px] text-white/30">
                <p>© 2026 Aether Neural Infrastructure</p>
                <div className="flex gap-12">
                  <a href="#" className="hover:text-white">
                    Privacy
                  </a>
                  <a href="#" className="hover:text-white">
                    Terms
                  </a>
                </div>
              </div>
            </footer>

            {/* AI Chat Assistant */}
            {isChatOpen && (
              <div className="fixed bottom-6 right-6 w-80 sm:w-96 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50">
                <div className="bg-black/50 p-4 border-b border-white/10 flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-[#818CF8] animate-pulse" />
                    <span className="text-xs uppercase tracking-[2px] font-bold">
                      Neural Assistant
                    </span>
                  </div>
                  <button
                    onClick={() => setIsChatOpen(false)}
                    className="text-white/40 hover:text-white"
                  >
                    <Icon name="x" size={16} />
                  </button>
                </div>

                <div className="flex-grow p-4 h-80 overflow-y-auto flex flex-col gap-4 no-scrollbar">
                  {chatMessages.map((msg, i) => (
                    <div
                      key={i}
                      className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}
                    >
                      <div
                        className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                          msg.role === "user"
                            ? "bg-[#818CF8]/20 text-[#e0e7ff] rounded-br-sm"
                            : "bg-white/5 text-white/80 rounded-bl-sm border border-white/5"
                        }`}
                      >
                        {msg.parts[0].text}
                      </div>
                    </div>
                  ))}
                  {isAiLoading && (
                    <div className="flex justify-start">
                      <div className="bg-white/5 border border-white/5 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-2">
                        <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" />
                        <div
                          className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce"
                          style={{ animationDelay: "0.1s" }}
                        />
                        <div
                          className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce"
                          style={{ animationDelay: "0.2s" }}
                        />
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-4 bg-black/50 border-t border-white/10">
                  <form
                    onSubmit={handleChatSubmit}
                    className="relative flex items-center"
                  >
                    <input
                      type="text"
                      placeholder="Commence query..."
                      className="w-full bg-white/5 border border-white/10 rounded-full pl-4 pr-12 py-3 text-xs focus:outline-none focus:border-[#818CF8]/40"
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                    />
                    <button
                      type="submit"
                      disabled={isAiLoading || !chatInput.trim()}
                      className="absolute right-2 p-2 bg-[#818CF8]/20 text-[#818CF8] rounded-full hover:bg-[#818CF8]/40 transition-colors disabled:opacity-50"
                    >
                      <Icon name="arrow-up" size={14} />
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* API Key Modal */}
            {showApiKeyModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100] px-4">
                <div className="bg-[#080808] border border-white/10 p-8 rounded-2xl max-w-md w-full relative accent-glow">
                  <button
                    onClick={() => setShowApiKeyModal(false)}
                    className="absolute top-4 right-4 text-white/40 hover:text-white"
                  >
                    <Icon name="x" size={20} />
                  </button>
                  <h3 className="font-serif text-2xl mb-4">
                    Neural Access Node
                  </h3>
                  <p className="text-white/50 text-sm mb-6 leading-relaxed">
                    Please provide a Google Gemini API key to activate the Smart
                    Search and Chat Assistant features. The key is securely
                    stored in your browser's local cache.
                  </p>
                  <input
                    type="password"
                    defaultValue={apiKey}
                    id="api-key-input"
                    placeholder="AIzaSy..."
                    className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#818CF8]/40 tracking-widest text-sm"
                  />
                  <button
                    onClick={() =>
                      saveApiKey(document.getElementById("api-key-input").value)
                    }
                    className="w-full bg-[#818CF8]/10 border border-[#818CF8]/30 text-[#818CF8] font-bold uppercase tracking-widest text-[10px] py-4 rounded-lg hover:bg-[#818CF8]/20 transition-all"
                  >
                    Activate Interface
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
    </html>
