<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether AI | Pro Neural Assistant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Hind Siliguri', 'sans-serif'],
                        serif: ['Georgia', 'serif'],
                    },
                    colors: {
                        accent: '#818CF8',
                        bg: '#080808',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#080808] text-white antialiased min-h-screen selection:bg-[#818CF8]/30;
                background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #080808 70%);
            }
        }
        @layer components {
            .glass-card {
                @apply bg-[rgba(255,255,255,0.03)] border border-[rgba(255,255,255,0.1)] rounded-2xl backdrop-blur-xl transition-all duration-500;
            }
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            .chat-msg { @apply p-4 rounded-2xl max-w-[85%] mb-4 text-sm leading-relaxed; }
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // আপনার নতুন এপিআই কি এখানে বসানো হয়েছে
        const API_KEY = "AIzaSyDDsPAJi-sCC8L_1Ccyr9tm1SrNZXSC0rU";

        const AI_TOOLS = [
            { id: 'chatgpt', name: 'ChatGPT', category: 'Text', link: 'https://chat.openai.com', pricing: 'Freemium', desc: 'Conversational AI' },
            { id: 'midjourney', name: 'Midjourney', category: 'Image', link: 'https://www.midjourney.com', pricing: 'Paid', desc: 'Art Generator' },
            { id: 'v0', name: 'v0.dev', category: 'Code', link: 'https://v0.dev', pricing: 'Freemium', desc: 'UI Generator' },
            { id: 'elevenlabs', name: 'ElevenLabs', category: 'Audio', link: 'https://elevenlabs.io', pricing: 'Freemium', desc: 'Voice AI' },
            { id: 'pika', name: 'Pika Labs', category: 'Video', link: 'https://pika.art', pricing: 'Freemium', desc: 'Video AI' }
        ];

        const Icon = ({ name, size = 16 }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [messages, setMessages] = useState([{ text: "হ্যালো আলামিন! আমি আপনার পার্সোনাল এআই। আমি কীভাবে সাহায্য করতে পারি?", sender: 'ai' }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = input;
                setMessages(prev => [...prev, { text: userMsg, sender: 'user' }]);
                setInput('');
                setLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userMsg }] }] })
                    });
                    const data = await res.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { text: aiText, sender: 'ai' }]);
                } catch (err) {
                    setMessages(prev => [...prev, { text: "কানেকশন সমস্যা। অনুগ্রহ করে আবার চেষ্টা করুন।", sender: 'ai' }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Nav */}
                    <nav className="p-6 flex justify-between items-center border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-2 font-serif font-bold italic text-2xl tracking-tighter">
                            <div className="w-2 h-2 rounded-full bg-[#818CF8]" />
                            <span>Aether.ai</span>
                        </div>
                        <button className="text-[10px] tracking-[3px] border border-white/20 px-6 py-2 rounded-full hover:bg-white/5 transition-all">SYSTEM ACTIVE</button>
                    </nav>

                    {/* Hero & Chat Section */}
                    <main className="max-w-6xl mx-auto w-full px-6 py-12 grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                        <div>
                            <span className="text-[10px] uppercase tracking-[4px] text-[#818CF8] mb-4 block font-medium">Enterprise Intelligence</span>
                            <h1 className="font-serif text-5xl md:text-7xl leading-tight tracking-tighter mb-6">Forge the Future of AI.</h1>
                            <p className="text-white/40 text-lg mb-8">আলামিন হোসাইন এর নিজস্ব এআই অ্যাসিস্ট্যান্ট এবং টুল ডিরেক্টরি।</p>
                            
                            <div className="grid grid-cols-2 gap-4">
                                {AI_TOOLS.map(t => (
                                    <div key={t.id} className="glass-card p-4 hover:border-[#818CF8]/30 cursor-pointer">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-[8px] text-[#818CF8] tracking-widest uppercase font-bold">{t.category}</span>
                                            <Icon name="external-link" size={12} className="text-white/20" />
                                        </div>
                                        <h4 className="font-serif text-lg">{t.name}</h4>
                                        <p className="text-[10px] text-white/30">{t.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Integrated Chatbox */}
                        <div className="glass-card flex flex-col h-[600px] border-[#818CF8]/20 overflow-hidden shadow-2xl">
                            <div className="p-4 border-b border-white/5 bg-white/5 flex items-center justify-between">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-[#818CF8]">Aether Live Console</span>
                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-6 no-scrollbar space-y-4">
                                {messages.map((m, i) => (
                                    <div key={i} className={`chat-msg ${m.sender === 'user' ? 'bg-[#818CF8] text-white ml-auto rounded-tr-none shadow-lg' : 'bg-white/5 border border-white/10 text-white/90 rounded-tl-none'}`}>
                                        {m.text}
                                    </div>
                                ))}
                                {loading && <div className="text-[10px] text-white/30 italic animate-pulse">Aether is calculating...</div>}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="p-4 bg-[#080808] border-t border-white/5 flex gap-2">
                                <input 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                    placeholder="মেসেজ লিখুন..." 
                                    className="flex-1 bg-transparent border border-white/10 rounded-full px-6 py-3 text-sm focus:outline-none focus:border-[#818CF8]/50 transition-all"
                                />
                                <button onClick={handleSend} className="bg-white text-black p-3 rounded-full hover:scale-105 active:scale-95 transition-all shadow-xl">
                                    <Icon name="arrow-up" size={20} />
                                </button>
                            </div>
                        </div>
                    </main>

                    <footer className="mt-auto py-8 text-center border-t border-white/5 opacity-20 text-[9px] tracking-[4px]">
                        © 2026 ALAMIN HOSSAIN | NEURAL NETWORK
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
