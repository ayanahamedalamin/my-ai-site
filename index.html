<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether AI - Smart Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .chat-container { height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 flex flex-col overflow-hidden">
        <div class="p-4 bg-blue-600 text-center font-bold text-xl shadow-md">Aether AI Assistant</div>
        
        <div id="chat-box" class="chat-container p-4 space-y-4 flex-1">
            <div class="bg-slate-700 p-3 rounded-lg rounded-tl-none w-fit max-w-[80%]">হ্যালো! আমি আপনার পার্সোনাল এআই। আমাকে যেকোনো প্রশ্ন করতে পারেন।</div>
        </div>

        <div class="p-4 bg-slate-900 border-t border-slate-700 flex gap-2">
            <input id="user-input" type="text" placeholder="এখানে লিখুন..." 
                class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-700 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA7vU0q8NZUvfsSQpvW7Ag0QNjAP5rh4_Y";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // User message
            appendMessage(message, 'user');
            userInput.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage(aiResponse, 'ai');
            } catch (error) {
                appendMessage("দুঃখিত, কানেকশনে সমস্যা হয়েছে। আবার চেষ্টা করুন।", 'error');
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'bg-blue-600 p-3 rounded-lg rounded-tr-none w-fit max-w-[80%] ml-auto' : 
                          sender === 'error' ? 'bg-red-500 p-3 rounded-lg w-fit max-w-[80%]' : 
                          'bg-slate-700 p-3 rounded-lg rounded-tl-none w-fit max-w-[80%]';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
