<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether - AI Tool Directory</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .accent-glow {
            box-shadow: 0 0 80px -20px rgba(129, 140, 248, 0.15);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const AI_TOOLS = [
            { id: '1', name: 'ChatGPT', category: 'Text', description: 'The industry-leading conversational AI by OpenAI. Versatile for writing and coding.', url: 'https://chat.openai.com', pricing: 'Freemium' },
            { id: '2', name: 'Midjourney', category: 'Image', description: 'Top-tier art generation renowned for photographic realism.', url: 'https://midjourney.com', pricing: 'Paid' },
            { id: '3', name: 'Runway Gen-3', category: 'Video', description: 'Powerful AI video generation for cinematic visuals.', url: 'https://runwayml.com', pricing: 'Freemium' },
            { id: '4', name: 'Claude', category: 'Text', description: 'Anthropic\'s high-performance LLM known for nuanced writing and safety.', url: 'https://claude.ai', pricing: 'Freemium' },
            { id: '5', name: 'v0.dev', category: 'Code', description: 'AI-powered component generator. Builds React components from natural language.', url: 'https://v0.dev', pricing: 'Freemium' },
            { id: '6', name: 'ElevenLabs', category: 'Audio', description: 'Realistic AI voice generator and text-to-speech engine.', url: 'https://elevenlabs.io', pricing: 'Freemium' },
            { id: '7', name: 'Suno', category: 'Audio', description: 'Create full-length songs with lyrics and melody from a simple prompt.', url: 'https://suno.com', pricing: 'Freemium' },
            { id: '8', name: 'Cursor', category: 'Code', description: 'An AI-first code editor for deep codebase understanding.', url: 'https://cursor.sh', pricing: 'Freemium' },
            { id: '9', name: 'Perplexity AI', category: 'Text', description: 'AI-powered search engine with real-time citations.', url: 'https://perplexity.ai', pricing: 'Freemium' },
        ];

        const CATEGORIES = ['All', 'Text', 'Image', 'Video', 'Code', 'Audio'];

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size }
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        function App() {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('GOOGLE_GEMINI_API_KEY') || '');
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([{ role: 'model', parts: [{ text: 'Neural Interface Active. How can I assist with your workflow today?' }] }]);
            const [chatInput, setChatInput] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isSearching, setIsSearching] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeCategory, searchQuery, isChatOpen, showApiKeyModal]);

            const saveApiKey = (key) => {
                localStorage.setItem('GOOGLE_GEMINI_API_KEY', key);
                setApiKey(key);
                setShowApiKeyModal(false);
            };

            const callGemini = async (contents) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });
                if (!response.ok) throw new Error('API Request Failed');
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            };

            const handleChatSubmit = async (e) => {
                e.preventDefault();
                if (!apiKey) return setShowApiKeyModal(true);
                if (!chatInput.trim() || isAiLoading) return;
                
                const newMessages = [...chatMessages, { role: 'user', parts: [{ text: chatInput }] }];
                setChatMessages(newMessages);
                setChatInput('');
                setIsAiLoading(true);

                try {
                    const ctx = `System context: You are Aether AI assistant. Guide the user on AI tools. Our tools: ${AI_TOOLS.map(t=>t.name).join(', ')}. Keep replies brief and professional.`;
                    
                    const apiMessages = newMessages.filter(msg => 
                        !msg.parts[0].text.includes('Neural Interface Active') && 
                        !msg.parts[0].text.includes('Error connecting') &&
                        !msg.parts[0].text.includes('Error: Please') // filter any local error strings
                    );

                    const contents = [
                        { role: 'user', parts: [{ text: ctx }] }, 
                        { role: 'model', parts: [{ text: 'Understood.'}] }, 
                        ...apiMessages
                    ];

                    const reply = await callGemini(contents);
                    setChatMessages(prev => [...prev, { role: 'model', parts: [{ text: reply }] }]);
                } catch (err) {
                    setChatMessages(prev => [...prev, { role: 'model', parts: [{ text: `Error: Please check your API key.` }] }]);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const handleSmartSearch = async () => {
                if (!apiKey) return setShowApiKeyModal(true);
                if (!searchQuery.trim() || isSearching) return;
                
                setIsSearching(true);
                try {
                    const prompt = `User query: "${searchQuery}". Our tools: ${AI_TOOLS.map(t=>t.name).join(', ')}. Return just the name of the single most relevant tool. No extra text or punctuation.`;
                    const reply = await callGemini([{ role: 'user', parts: [{ text: prompt }] }]);
                    const matchName = reply.trim();
                    if (matchName) {
                        setSearchQuery(matchName);
                        setActiveCategory('All');
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setIsSearching(false);
                }
            };

            const filteredTools = useMemo(() => {
                return AI_TOOLS.filter(tool => {
                    const matchesCategory = activeCategory === 'All' || tool.category === activeCategory;
                    const matchesSearch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [activeCategory, searchQuery]);

            return (
                <div className="min-h-screen flex flex-col bg-[#050505] accent-glow selection:bg-[#818CF8]/30">
                    <div className="absolute top-0 inset-x-0 h-[500px] bg-gradient-to-b from-[#818CF8]/10 to-transparent pointer-events-none" />
                    
                    <header className="pt-12 px-8 max-w-7xl mx-auto w-full relative z-10">
                        <div className="flex justify-between items-start mb-24">
                            <div className="flex items-center gap-4">
                                <div className="w-8 h-8 rounded bg-white flex items-center justify-center">
                                    <div className="w-4 h-4 border-[2px] border-black rounded-full" />
                                </div>
                                <span className="font-bold tracking-[4px] text-sm hidden sm:block">AETHER</span>
                            </div>
                            <div className="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[2px] font-medium text-white/40">
                                <a href="#directory" className="hover:text-white transition-colors">Directory</a>
                                <button onClick={() => setShowApiKeyModal(true)} className="hover:text-white transition-colors flex items-center gap-2">
                                    <Icon name="key" size={14} /> API Key
                                </button>
                                <button className="border border-white/20 text-white px-8 py-2 rounded-full text-[10px] font-bold hover:bg-white/5 transition-all">LOGIN</button>
                            </div>
                        </div>
                        
                        <div className="max-w-3xl">
                            <div className="inline-flex items-center gap-3 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-md mb-8">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8] animate-pulse" />
                                <span className="text-[10px] font-medium tracking-[2px] uppercase">Enterprise Intelligence Node</span>
                            </div>
                            
                            <h1 className="text-5xl md:text-7xl font-light tracking-tight mb-8 leading-[1.1] font-serif">Forge the Future of <br/><span className="text-[#818CF8] italic opacity-90">Digital Cognition.</span></h1>
                            <p className="text-white/50 text-lg md:text-xl max-w-lg mb-12">A curated ecosystem of autonomous tools designed for high-performance creative synthesis.</p>
                            <div className="flex gap-6">
                                <a href="#directory" className="bg-white text-black font-bold py-4 px-12 rounded-full text-[10px] uppercase tracking-widest hover:scale-105 transition-all">Start Exploring</a>
                                <button onClick={() => setIsChatOpen(true)} className="border border-white/20 py-4 px-12 rounded-full text-[10px] text-white uppercase tracking-widest hover:bg-white/5 transition-all flex items-center gap-2">
                                    <Icon name="message-square" size={14} /> AI Assistant
                                </button>
                            </div>
                            <div className="h-[1px] bg-gradient-to-r from-[#818CF8]/30 to-transparent mt-24 opacity-40 w-full" />
                        </div>
                    </header>

                    <main className="flex-grow py-24 px-8 max-w-7xl mx-auto w-full relative z-10" id="directory">
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-16">
                            <div>
                                <span className="text-[10px] uppercase tracking-[3px] text-[#818CF8] mb-2 block">Repository</span>
                                <h2 className="font-serif text-5xl">Intelligence Nodes</h2>
                            </div>
                            <div className="relative group w-full md:w-[450px] flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="Semantic query..." 
                                    className="w-full bg-black/20 border border-white/10 rounded-full px-8 py-3 focus:outline-none focus:border-[#818CF8]/40 transition-all text-xs tracking-widest lowercase"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleSmartSearch()}
                                />
                                <button 
                                    onClick={handleSmartSearch}
                                    disabled={isSearching}
                                    className="bg-[#818CF8]/10 text-[#818CF8] border border-[#818CF8]/30 px-6 rounded-full hover:bg-[#818CF8]/20 transition-colors text-[10px] uppercase tracking-widest whitespace-nowrap"
                                >
                                    {isSearching ? <Icon name="loader" size={14} className="animate-spin" /> : 'Smart Search'}
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-2 mb-12">
                            {CATEGORIES.map(category => (
                                <button
                                    key={category}
                                    onClick={() => setActiveCategory(category)}
                                    className={`px-6 py-2 rounded-full text-[10px] uppercase tracking-widest transition-all ${
                                        activeCategory === category 
                                            ? 'bg-white text-black font-bold' 
                                            : 'border border-white/10 text-white/50 hover:border-white/30 hover:text-white'
                                    }`}
                                >
                                    {category}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredTools.map((tool) => (
                                <div key={tool.id} className="group border border-white/5 bg-[#0a0a0a] rounded-2xl p-8 hover:bg-[#111] hover:border-white/10 transition-all cursor-pointer flex flex-col justify-between min-h-[280px]">
                                    <div>
                                        <div className="flex justify-between items-start mb-6">
                                            <span className="text-[#818CF8] text-[9px] uppercase tracking-[2px] font-bold">{tool.category}</span>
                                            <span className="text-[9px] uppercase tracking-[2px] text-white/30 border border-white/10 px-3 py-1 rounded-full">{tool.pricing}</span>
                                        </div>
                                        <h3 className="text-2xl font-serif mb-4 group-hover:text-[#818CF8] transition-colors">{tool.name}</h3>
                                        <p className="text-white/40 text-sm leading-relaxed">{tool.description}</p>
                                    </div>
                                    <div className="mt-8 flex items-center justify-between opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
                                        <span className="text-[#818CF8] text-[10px] uppercase tracking-widest font-bold flex items-center gap-2">
                                            <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8] animate-pulse" />
                                            Active System
                                        </span>
                                        <a href={tool.url} target="_blank" rel="noopener noreferrer" className="text-white/50 hover:text-white transition-colors flex items-center gap-2 text-xs">
                                            Visit Node <Icon name="external-link" size={14} />
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {filteredTools.length === 0 && (
                            <div className="py-24 text-center border border-white/5 rounded-2xl bg-white/[0.02]">
                                <Icon name="search" size={32} className="mx-auto text-white/20 mb-4" />
                                <p className="text-white/40 text-sm flex items-center justify-center gap-2">
                                    No parameters matching <span className="text-[#818CF8]">"{searchQuery}"</span>
                                </p>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-white/5 py-12 px-8 mt-auto z-10 bg-[#050505]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] text-white/30 tracking-[2px] uppercase">
                            <div className="flex items-center gap-4">
                                <div className="w-4 h-4 border border-white/20 rounded-full" />
                                <span>© 2024 Aether Protocol. All rights reserved.</span>
                            </div>
                            <div className="flex gap-12">
                                <a href="#" className="hover:text-white transition-colors">Privacy Protocol</a>
                                <a href="#" className="hover:text-white transition-colors">Term of Consensus</a>
                            </div>
                        </div>
                    </footer>

                    {/* AI Chat Assistant */}
                    {isChatOpen && (
                        <div className="fixed bottom-6 right-6 w-80 sm:w-96 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50">
                            <div className="bg-black/50 p-4 border-b border-white/10 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#818CF8] animate-pulse" />
                                    <span className="text-xs uppercase tracking-[2px] font-bold">Neural Assistant</span>
                                </div>
                                <button onClick={() => setIsChatOpen(false)} className="text-white/40 hover:text-white">
                                    <Icon name="x" size={16} />
                                </button>
                            </div>
                            
                            <div className="flex-grow p-4 h-80 overflow-y-auto flex flex-col gap-4 no-scrollbar">
                                {chatMessages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                                            msg.role === 'user' 
                                                ? 'bg-[#818CF8]/20 text-[#e0e7ff] rounded-br-sm' 
                                                : 'bg-white/5 text-white/80 rounded-bl-sm border border-white/5'
                                        }`}>
                                            {msg.parts[0].text}
                                        </div>
                                    </div>
                                ))}
                                {isAiLoading && (
                                    <div className="flex justify-start">
                                        <div className="bg-white/5 border border-white/5 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-2">
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" />
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" style={{ animationDelay: '0.1s' }} />
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" style={{ animationDelay: '0.2s' }} />
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="p-4 bg-black/50 border-t border-white/10">
                                <form onSubmit={handleChatSubmit} className="relative flex items-center">
                                    <input 
                                        type="text" 
                                        placeholder="Commence query..."
                                        className="w-full bg-white/5 border border-white/10 rounded-full pl-4 pr-12 py-3 text-xs focus:outline-none focus:border-[#818CF8]/40"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                    />
                                    <button 
                                        type="submit" 
                                        disabled={isAiLoading || !chatInput.trim()}
                                        className="absolute right-2 p-2 bg-[#818CF8]/20 text-[#818CF8] rounded-full hover:bg-[#818CF8]/40 transition-colors disabled:opacity-50"
                                    >
                                        <Icon name="arrow-up" size={14} />
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* API Key Modal */}
                    {showApiKeyModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100] px-4">
                            <div className="bg-[#080808] border border-white/10 p-8 rounded-2xl max-w-md w-full relative accent-glow">
                                <button onClick={() => setShowApiKeyModal(false)} className="absolute top-4 right-4 text-white/40 hover:text-white">
                                    <Icon name="x" size={20} />
                                </button>
                                <h3 className="font-serif text-2xl mb-4">Neural Access Node</h3>
                                <p className="text-white/50 text-sm mb-6 leading-relaxed">Please provide a Google Gemini API key to activate the Smart Search and Chat Assistant features. The key is securely stored in your browser's local cache.</p>
                                <input 
                                    type="password" 
                                    defaultValue={apiKey}
                                    id="api-key-input"
                                    placeholder="AIzaSy..."
                                    className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#818CF8]/40 tracking-widest text-sm"
                                />
                                <button 
                                    onClick={() => saveApiKey(document.getElementById('api-key-input').value)}
                                    className="w-full bg-[#818CF8]/10 border border-[#818CF8]/30 text-[#818CF8] font-bold uppercase tracking-widest text-[10px] py-4 rounded-lg hover:bg-[#818CF8]/20 transition-all"
                                >
                                    Activate Interface
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html><!DOCTYPE html>

                });
                if (!response.ok) throw new Error('API Request Failed');
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            };

            const handleChatSubmit = async (e) => {
                e.preventDefault();
                if (!apiKey) return setShowApiKeyModal(true);
                if (!chatInput.trim() || isAiLoading) return;
                
                const newMessages = [...chatMessages, { role: 'user', parts: [{ text: chatInput }] }];
                setChatMessages(newMessages);
                setChatInput('');
                setIsAiLoading(true);

                try {
                    const ctx = `System context: You are Aether AI assistant. Guide the user on AI tools. Our tools: ${AI_TOOLS.map(t=>t.name).join(', ')}. Keep replies brief and professional.`;
                    
                    const apiMessages = newMessages.filter(msg => 
                        !msg.parts[0].text.includes('Neural Interface Active') && 
                        !msg.parts[0].text.includes('Error connecting') &&
                        !msg.parts[0].text.includes('Error: Please') // filter any local error strings
                    );

                    const contents = [
                        { role: 'user', parts: [{ text: ctx }] }, 
                        { role: 'model', parts: [{ text: 'Understood.'}] }, 
                        ...apiMessages
                    ];

                    const reply = await callGemini(contents);
                    setChatMessages(prev => [...prev, { role: 'model', parts: [{ text: reply }] }]);
                } catch (err) {
                    setChatMessages(prev => [...prev, { role: 'model', parts: [{ text: `Error: Please check your API key.` }] }]);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const handleSmartSearch = async () => {
                if (!apiKey) return setShowApiKeyModal(true);
                if (!searchQuery.trim() || isSearching) return;
                
                setIsSearching(true);
                try {
                    const prompt = `User query: "${searchQuery}". Our tools: ${AI_TOOLS.map(t=>t.name).join(', ')}. Return just the name of the single most relevant tool. No extra text or punctuation.`;
                    const reply = await callGemini([{ role: 'user', parts: [{ text: prompt }] }]);
                    const matchName = reply.trim();
                    if (matchName) {
                        setSearchQuery(matchName);
                        setActiveCategory('All');
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setIsSearching(false);
                }
            };

            const filteredTools = useMemo(() => {
                return AI_TOOLS.filter(tool => {
                    const matchesCategory = activeCategory === 'All' || tool.category === activeCategory;
                    const matchesSearch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [activeCategory, searchQuery]);

            return (
                <div className="min-h-screen flex flex-col bg-[#050505] accent-glow selection:bg-[#818CF8]/30">
                    <div className="absolute top-0 inset-x-0 h-[500px] bg-gradient-to-b from-[#818CF8]/10 to-transparent pointer-events-none" />
                    
                    <header className="pt-12 px-8 max-w-7xl mx-auto w-full relative z-10">
                        <div className="flex justify-between items-start mb-24">
                            <div className="flex items-center gap-4">
                                <div className="w-8 h-8 rounded bg-white flex items-center justify-center">
                                    <div className="w-4 h-4 border-[2px] border-black rounded-full" />
                                </div>
                                <span className="font-bold tracking-[4px] text-sm hidden sm:block">AETHER</span>
                            </div>
                            <div className="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[2px] font-medium text-white/40">
                                <a href="#directory" className="hover:text-white transition-colors">Directory</a>
                                <button onClick={() => setShowApiKeyModal(true)} className="hover:text-white transition-colors flex items-center gap-2">
                                    <Icon name="key" size={14} /> API Key
                                </button>
                                <button className="border border-white/20 text-white px-8 py-2 rounded-full text-[10px] font-bold hover:bg-white/5 transition-all">LOGIN</button>
                            </div>
                        </div>
                        
                        <div className="max-w-3xl">
                            <div className="inline-flex items-center gap-3 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-md mb-8">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8] animate-pulse" />
                                <span className="text-[10px] font-medium tracking-[2px] uppercase">Enterprise Intelligence Node</span>
                            </div>
                            
                            <h1 className="text-5xl md:text-7xl font-light tracking-tight mb-8 leading-[1.1] font-serif">Forge the Future of <br/><span className="text-[#818CF8] italic opacity-90">Digital Cognition.</span></h1>
                            <p className="text-white/50 text-lg md:text-xl max-w-lg mb-12">A curated ecosystem of autonomous tools designed for high-performance creative synthesis.</p>
                            <div className="flex gap-6">
                                <a href="#directory" className="bg-white text-black font-bold py-4 px-12 rounded-full text-[10px] uppercase tracking-widest hover:scale-105 transition-all">Start Exploring</a>
                                <button onClick={() => setIsChatOpen(true)} className="border border-white/20 py-4 px-12 rounded-full text-[10px] text-white uppercase tracking-widest hover:bg-white/5 transition-all flex items-center gap-2">
                                    <Icon name="message-square" size={14} /> AI Assistant
                                </button>
                            </div>
                            <div className="h-[1px] bg-gradient-to-r from-[#818CF8]/30 to-transparent mt-24 opacity-40 w-full" />
                        </div>
                    </header>

                    <main className="flex-grow py-24 px-8 max-w-7xl mx-auto w-full relative z-10" id="directory">
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-16">
                            <div>
                                <span className="text-[10px] uppercase tracking-[3px] text-[#818CF8] mb-2 block">Repository</span>
                                <h2 className="font-serif text-5xl">Intelligence Nodes</h2>
                            </div>
                            <div className="relative group w-full md:w-[450px] flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="Semantic query..." 
                                    className="w-full bg-black/20 border border-white/10 rounded-full px-8 py-3 focus:outline-none focus:border-[#818CF8]/40 transition-all text-xs tracking-widest lowercase"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleSmartSearch()}
                                />
                                <button 
                                    onClick={handleSmartSearch}
                                    disabled={isSearching}
                                    className="bg-[#818CF8]/10 text-[#818CF8] border border-[#818CF8]/30 px-6 rounded-full hover:bg-[#818CF8]/20 transition-colors text-[10px] uppercase tracking-widest whitespace-nowrap"
                                >
                                    {isSearching ? <Icon name="loader" size={14} className="animate-spin" /> : 'Smart Search'}
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-2 mb-12">
                            {CATEGORIES.map(category => (
                                <button
                                    key={category}
                                    onClick={() => setActiveCategory(category)}
                                    className={`px-6 py-2 rounded-full text-[10px] uppercase tracking-widest transition-all ${
                                        activeCategory === category 
                                            ? 'bg-white text-black font-bold' 
                                            : 'border border-white/10 text-white/50 hover:border-white/30 hover:text-white'
                                    }`}
                                >
                                    {category}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredTools.map((tool) => (
                                <div key={tool.id} className="group border border-white/5 bg-[#0a0a0a] rounded-2xl p-8 hover:bg-[#111] hover:border-white/10 transition-all cursor-pointer flex flex-col justify-between min-h-[280px]">
                                    <div>
                                        <div className="flex justify-between items-start mb-6">
                                            <span className="text-[#818CF8] text-[9px] uppercase tracking-[2px] font-bold">{tool.category}</span>
                                            <span className="text-[9px] uppercase tracking-[2px] text-white/30 border border-white/10 px-3 py-1 rounded-full">{tool.pricing}</span>
                                        </div>
                                        <h3 className="text-2xl font-serif mb-4 group-hover:text-[#818CF8] transition-colors">{tool.name}</h3>
                                        <p className="text-white/40 text-sm leading-relaxed">{tool.description}</p>
                                    </div>
                                    <div className="mt-8 flex items-center justify-between opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
                                        <span className="text-[#818CF8] text-[10px] uppercase tracking-widest font-bold flex items-center gap-2">
                                            <div className="w-1.5 h-1.5 rounded-full bg-[#818CF8] animate-pulse" />
                                            Active System
                                        </span>
                                        <a href={tool.url} target="_blank" rel="noopener noreferrer" className="text-white/50 hover:text-white transition-colors flex items-center gap-2 text-xs">
                                            Visit Node <Icon name="external-link" size={14} />
                                        </a>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {filteredTools.length === 0 && (
                            <div className="py-24 text-center border border-white/5 rounded-2xl bg-white/[0.02]">
                                <Icon name="search" size={32} className="mx-auto text-white/20 mb-4" />
                                <p className="text-white/40 text-sm flex items-center justify-center gap-2">
                                    No parameters matching <span className="text-[#818CF8]">"{searchQuery}"</span>
                                </p>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-white/5 py-12 px-8 mt-auto z-10 bg-[#050505]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] text-white/30 tracking-[2px] uppercase">
                            <div className="flex items-center gap-4">
                                <div className="w-4 h-4 border border-white/20 rounded-full" />
                                <span>© 2024 Aether Protocol. All rights reserved.</span>
                            </div>
                            <div className="flex gap-12">
                                <a href="#" className="hover:text-white transition-colors">Privacy Protocol</a>
                                <a href="#" className="hover:text-white transition-colors">Term of Consensus</a>
                            </div>
                        </div>
                    </footer>

                    {/* AI Chat Assistant */}
                    {isChatOpen && (
                        <div className="fixed bottom-6 right-6 w-80 sm:w-96 bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50">
                            <div className="bg-black/50 p-4 border-b border-white/10 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#818CF8] animate-pulse" />
                                    <span className="text-xs uppercase tracking-[2px] font-bold">Neural Assistant</span>
                                </div>
                                <button onClick={() => setIsChatOpen(false)} className="text-white/40 hover:text-white">
                                    <Icon name="x" size={16} />
                                </button>
                            </div>
                            
                            <div className="flex-grow p-4 h-80 overflow-y-auto flex flex-col gap-4 no-scrollbar">
                                {chatMessages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${
                                            msg.role === 'user' 
                                                ? 'bg-[#818CF8]/20 text-[#e0e7ff] rounded-br-sm' 
                                                : 'bg-white/5 text-white/80 rounded-bl-sm border border-white/5'
                                        }`}>
                                            {msg.parts[0].text}
                                        </div>
                                    </div>
                                ))}
                                {isAiLoading && (
                                    <div className="flex justify-start">
                                        <div className="bg-white/5 border border-white/5 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-2">
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" />
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" style={{ animationDelay: '0.1s' }} />
                                            <div className="w-1.5 h-1.5 bg-[#818CF8] rounded-full animate-bounce" style={{ animationDelay: '0.2s' }} />
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="p-4 bg-black/50 border-t border-white/10">
                                <form onSubmit={handleChatSubmit} className="relative flex items-center">
                                    <input 
                                        type="text" 
                                        placeholder="Commence query..."
                                        className="w-full bg-white/5 border border-white/10 rounded-full pl-4 pr-12 py-3 text-xs focus:outline-none focus:border-[#818CF8]/40"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                    />
                                    <button 
                                        type="submit" 
                                        disabled={isAiLoading || !chatInput.trim()}
                                        className="absolute right-2 p-2 bg-[#818CF8]/20 text-[#818CF8] rounded-full hover:bg-[#818CF8]/40 transition-colors disabled:opacity-50"
                                    >
                                        <Icon name="arrow-up" size={14} />
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* API Key Modal */}
                    {showApiKeyModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100] px-4">
                            <div className="bg-[#080808] border border-white/10 p-8 rounded-2xl max-w-md w-full relative accent-glow">
                                <button onClick={() => setShowApiKeyModal(false)} className="absolute top-4 right-4 text-white/40 hover:text-white">
                                    <Icon name="x" size={20} />
                                </button>
                                <h3 className="font-serif text-2xl mb-4">Neural Access Node</h3>
                                <p className="text-white/50 text-sm mb-6 leading-relaxed">Please provide a Google Gemini API key to activate the Smart Search and Chat Assistant features. The key is securely stored in your browser's local cache.</p>
                                <input 
                                    type="password" 
                                    defaultValue={apiKey}
                                    id="api-key-input"
                                    placeholder="AIzaSy..."
                                    className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#818CF8]/40 tracking-widest text-sm"
                                />
                                <button 
                                    onClick={() => saveApiKey(document.getElementById('api-key-input').value)}
                                    className="w-full bg-[#818CF8]/10 border border-[#818CF8]/30 text-[#818CF8] font-bold uppercase tracking-widest text-[10px] py-4 rounded-lg hover:bg-[#818CF8]/20 transition-all"
                                >
                                    Activate Interface
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
